version: '3.8'

services:
  # --- PostgreSQL with pgvector ---
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-<DB_PASSWORD>}
      POSTGRES_DB: ${PG_DATABASE:-ragchat}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: rag-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- RabbitMQ ---
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: rag-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672" # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- SeaweedFS Stack ---
  seaweedfs-master:
    image: chrislusf/seaweedfs:latest
    container_name: rag-seaweed-master
    command: "master -ip=seaweedfs-master"
    ports:
      - "9333:9333"
      - "19333:19333"

  seaweedfs-volume:
    image: chrislusf/seaweedfs:latest
    container_name: rag-seaweed-volume
    command: "volume -mserver=seaweedfs-master:9333 -port=8081"
    depends_on:
      - seaweedfs-master

  seaweedfs-filer:
    image: chrislusf/seaweedfs:latest
    container_name: rag-seaweed-filer
    command: "filer -master=seaweedfs-master:9333"
    ports:
      - "8888:8888"
      - "18888:18888"
    depends_on:
      - seaweedfs-master

volumes:
  postgres_data:
